# =============================================================================
# DOCKER COMPOSE — Full Infrastructure (Fixed & Updated)
# =============================================================================

x-cluster-env: &cluster-env
  CLUSTER_SECRET: "a94a8fe5ccb19ba61c4c0873d391e987982fbbd3dc567d9d3e51a9b3c506dc95"
  CLUSTER_METRICS_ENABLESTATS: "true"
  CLUSTER_PINTRACKER_STATELESS_CONCURRENTPINS: "10"

services:
  # --- IPFS NODE 0 (Base Kubo Node) ---
  ipfs0:
    image: ipfs/kubo:latest
    container_name: ipfs0
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001"
      - "8080:8080"
      - "4001:4001"
    volumes:
      - ipfs0-data:/data/ipfs
    networks:
      - credential-net
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
    restart: unless-stopped

  # --- IPFS NODE 1 (Base Kubo Node) ---
  ipfs1:
    image: ipfs/kubo:latest
    container_name: ipfs1
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5003:5001"
      - "8082:8080"
      - "4003:4001"
    volumes:
      - ipfs1-data:/data/ipfs
    networks:
      - credential-net
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
    restart: unless-stopped

  # --- CLUSTER PEER 0 (Manages ipfs0) ---
  cluster0:
    image: ipfs/ipfs-cluster:latest
    container_name: cluster0
    depends_on:
      ipfs0:
        condition: service_healthy
    environment:
      <<: *cluster-env
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs0/tcp/5001
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_LISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9096
      CLUSTER_IPFSPROXY_LISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9095
      CLUSTER_IPFSPROXY_NODEMULTIADDRESS: /dns4/ipfs0/tcp/5001
      CLUSTER_REPLICATIONFACTORMIN: "-1"
      CLUSTER_REPLICATIONFACTORMAX: "-1"
    ports:
      - "9094:9094"
      - "9096:9096"
    volumes:
      - cluster0-data:/data/ipfs-cluster
      - ./cluster0-config/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - credential-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs-cluster-ctl", "id"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s # Gives it time to win the Raft election seen in your logs  # --- CLUSTER PEER 1 (Manages ipfs1) ---
  cluster1:
    image: ipfs/ipfs-cluster:latest
    container_name: cluster1
    depends_on:
      ipfs1:
        condition: service_healthy
      cluster0:
        condition: service_healthy
    environment:
      <<: *cluster-env
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs1/tcp/5001
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_LISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9096
      CLUSTER_REPLICATIONFACTORMIN: "-1"
      CLUSTER_REPLICATIONFACTORMAX: "-1"
      CLUSTER_BOOTSTRAP: "" # Handled by entrypoint.sh
    ports:
      - "9194:9094"
      - "9196:9096"
    volumes:
      - cluster1-data:/data/ipfs-cluster
      - ./cluster1-config/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - credential-net
    restart: unless-stopped

  # --- HARDHAT NODE ---
  hardhat:
    image: node:20-alpine
    container_name: hardhat-node
    working_dir: /app
    command: sh -c "npm install --silent && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    volumes:
      - ../blockchain:/app
      - hardhat-node-modules:/app/node_modules
    networks:
      - credential-net
    restart: unless-stopped

networks:
  credential-net:
    driver: bridge

volumes:
  ipfs0-data:
  ipfs1-data:
  cluster0-data:
  cluster1-data:
  hardhat-node-modules: