<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CertiChain — University Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Geist+Mono&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: { ink: '#0F0F0F', paper: '#FAFAF8', seal: '#C17A3A', mist: '#E8E6E1', 'surface-container-low': '#F6F3F2', 'on-surface-variant': '#534439' }, fontFamily: { serif: ['Instrument Serif','serif'], sans: ['Inter','sans-serif'], mono: ['Geist Mono','monospace'] } } } };
</script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; } body { background-color: #FAFAF8; }</style>
</head>
<body class="font-sans text-ink min-h-screen selection:bg-seal/20">

<header class="fixed left-0 right-0 top-0 z-50 flex min-h-[72px] w-full items-center border-b border-mist/50 bg-paper/75 px-6 backdrop-blur-[12px] md:px-8">
  <div class="flex min-w-0 flex-1 items-center">
    <a class="font-serif text-2xl italic text-ink" href="index.html">CertiChain</a>
  </div>
  <nav class="absolute left-1/2 top-1/2 hidden -translate-x-1/2 -translate-y-1/2 md:block">
    <ul class="flex items-center gap-10 font-serif text-lg tracking-tight text-ink">
      <li><a class="border-b-2 border-seal pb-1 font-medium text-seal" href="university.html">Universities</a></li>
      <li><a class="opacity-70 hover:text-seal" href="student.html">Students</a></li>
      <li><a class="opacity-70 hover:text-seal" href="employer.html">Verify</a></li>
    </ul>
  </nav>
</header>

<main class="mx-auto max-w-[420px] px-6 pb-24 pt-32">
  <div class="text-center mb-10">
    <span class="font-sans text-[11px] uppercase tracking-[0.2em] text-ink/50">Registrar Access</span>
    <h1 class="font-serif text-[40px] leading-[1.1] tracking-tight mt-3 mb-3">University Portal</h1>
    <p class="font-sans text-[14px] text-on-surface-variant opacity-80">
      Sign in to issue and manage credentials.
    </p>
  </div>

  <form id="university-login-form" class="space-y-5">
    <div>
      <label class="block font-sans text-[11px] uppercase tracking-[0.08em] text-on-surface-variant mb-2" for="username">
        Username
      </label>
      <input id="username" name="username" type="text" autocomplete="username" required
             placeholder="e.g. registrar"
             class="w-full h-12 px-4 bg-surface-container-low border border-mist/50 rounded-[6px]
                    font-sans text-[14px] focus:outline-none focus:border-seal transition-colors"/>
    </div>
    <div>
      <label class="block font-sans text-[11px] uppercase tracking-[0.08em] text-on-surface-variant mb-2" for="password">
        Password
      </label>
      <input id="password" name="password" type="password" autocomplete="current-password" required
             placeholder="••••••"
             class="w-full h-12 px-4 bg-surface-container-low border border-mist/50 rounded-[6px]
                    font-sans text-[14px] focus:outline-none focus:border-seal transition-colors"/>
    </div>

    <p id="login-error" class="font-mono text-[12px] text-[#B03A2A] min-h-[1.2em]"></p>

    <button type="submit"
            class="btn-primary w-full h-12 bg-ink text-paper rounded-[6px] font-sans text-[11px]
                   uppercase tracking-[0.15em] font-semibold hover:bg-seal icon-btn" data-ripple="">
      Sign In
    </button>
  </form>

  <p class="text-center mt-8 font-sans text-[12px] text-ink/40">
    Are you a student? <a href="student-login.html" class="text-seal underline underline-offset-4">Student login →</a>
  </p>
  <p class="text-center mt-4 font-sans text-[11px] text-ink/30">
    Demo: registrar / admin123 · spce_admin / spce2024
  </p>
</main>

<footer class="border-t border-mist/50 px-8 py-8 text-center font-sans text-[11px] uppercase tracking-widest text-ink/40">
  © 2026 CertiChain Ledger
</footer>

<script src="app.js"></script>
</body>
</html>
